<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>평가 대시보드</title>
  <link rel="stylesheet" href="dashboard.css">
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <!-- 상단 헤더 -->
  <header id="app-header" class="no-print">
    <div class="header-left">
      <span class="header-title">📊 평가 대시보드</span>
      <span id="header-breadcrumb" class="header-breadcrumb"></span>
    </div>
    <div class="header-right" id="header-nav" style="display:none;">
      <button id="btn-back-summary" onclick="showPage('summary')">← 이전 페이지로 이동</button>
      <button id="btn-prev" onclick="navigatePrev()">◀ 이전</button>
      <span id="nav-counter"></span>
      <button id="btn-next" onclick="navigateNext()">다음 ▶</button>
    </div>
  </header>

  <!-- 업로드 페이지 -->
  <div id="upload-page" class="page">
    <div class="upload-container">
      <h2>평가 대시보드</h2>
      <p class="upload-subtitle">아래 두 파일을 각각 선택해주세요.</p>

      <div class="upload-file-rows">
        <div class="upload-file-row">
          <span class="upload-file-label">25년 성과 데이터 <span style="color:var(--red);font-size:11px;">필수</span></span>
          <label class="btn-upload-sm">
            파일 선택
            <input type="file" id="file-input-main" accept=".xlsx,.xls" style="display:none;">
          </label>
          <span id="file-name-main" class="file-name-display">미선택</span>
        </div>
        <div class="upload-file-row">
          <span class="upload-file-label">과거 성과 데이터 <span class="optional-badge">선택</span></span>
          <label class="btn-upload-sm">
            파일 선택
            <input type="file" id="file-input-history" accept=".xlsx,.xls" style="display:none;">
          </label>
          <span id="file-name-history" class="file-name-display">미선택</span>
        </div>
      </div>
      <button id="btn-start" class="btn-start" disabled onclick="processFiles()">대시보드 생성</button>

      <div id="upload-error" class="error-msg" style="display:none;"></div>
      <div id="upload-loading" class="loading" style="display:none;">⏳ 파일을 분석하는 중...</div>
    </div>
  </div>

  <!-- 요약 페이지 -->
  <div id="summary-page" class="page" style="display:none;">
    <div class="page-content">
      <div class="summary-stats">
        <div class="stat-card">
          <div class="stat-label">부문</div>
          <div class="stat-value" id="stat-division">-</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">전체 인원</div>
          <div class="stat-value" id="stat-total">-</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">평가 완료</div>
          <div class="stat-value" id="stat-completed">-</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">달성도 평균</div>
          <div class="stat-value" id="stat-avg">-</div>
        </div>
      </div>

      <div class="summary-charts">
        <div class="chart-card">
          <h3 id="chart-final-title">최종 등급 분포</h3>
          <div class="chart-wrap-sm">
            <canvas id="grade-chart-final"></canvas>
          </div>
          <div id="grade-final-no-data" class="no-data" style="display:none;">데이터 없음</div>
          <div class="grade-guide">
            <span class="grade-guide-item grade-S">S: 최우수</span>
            <span class="grade-guide-item grade-A">A: 우수</span>
            <span class="grade-guide-item grade-B">B: 양호</span>
            <span class="grade-guide-item grade-C">C: 개선필요</span>
          </div>
        </div>
        <div class="chart-card">
          <h3>부서별 최종 등급 분포</h3>
          <div class="chart-wrap-dept">
            <canvas id="dept-grade-chart"></canvas>
          </div>
          <div id="dept-grade-no-data" class="no-data" style="display:none;">데이터 없음</div>
        </div>
      </div>

      <div class="table-card">
        <h3>전체 인원 목록 <span id="table-count" class="count-badge"></span></h3>
        <div class="table-scroll">
          <table id="summary-table">
            <colgroup></colgroup>
            <thead><tr></tr></thead>
            <tbody id="summary-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- 개인 상세 페이지 -->
  <div id="detail-page" class="page" style="display:none;">
    <div class="page-content" id="detail-content"></div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
